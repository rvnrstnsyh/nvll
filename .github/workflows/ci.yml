name: CI

on:
  push:
    branches:
      - main
      - staging*
      - dev*
      - feat*
  pull_request:
    branches:
      - main
      - staging*
      - dev*
      - feat*

jobs:
  check:
    name: Next.js CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run fmt:check
        continue-on-error: false

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
